name: Todo Task
description: 记录普通开发、整理、验证或发布待办
title: "[Todo]: "
labels:
  - todo
body:
  - type: dropdown
    id: area
    attributes:
      label: 范围 / Area
      description: 这个待办主要影响哪里？
      options:
        - 文档 / Docs
        - 发布 / Release
        - 仓库维护 / Repository
        - packwiz 元数据 / Packwiz metadata
        - 配置 / Config
        - KubeJS
        - 测试验证 / Verification
        - 其他 / Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级 / Priority
      options:
        - P0 - 阻塞 playable / Blocking
        - P1 - 当前里程碑需要 / Current milestone
        - P2 - 有空处理 / Backlog
        - P3 - 想法记录 / Idea
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 详细描述 / Details
      description: 补充背景、现状、期望改动、相关限制或需要注意的地方。
      placeholder: |
        当前情况：

        需要处理：

        注意事项：
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 子任务 / Checklist
      description: 拆成可勾选的小步骤。
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 完成标准 / Definition of Done
      description: 只写可验证的关闭条件，不重复描述任务背景。
      placeholder: |
        - [ ] 相关文件已提交
        - [ ] 本地检查通过
        - [ ] 需要的截图、日志或说明已补充
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 备注 / Notes
      description: 链接、上下文、相关 issue 或临时结论。
    validations:
      required: false
