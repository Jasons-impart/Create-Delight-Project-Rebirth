name: KubeJS or Config Todo
description: 记录 KubeJS、配置迁移、标签、配方或客户端脚本待办
title: "[KubeJS/Config]: "
labels:
  - todo
  - kubejs
body:
  - type: dropdown
    id: layer
    attributes:
      label: 层级 / Layer
      options:
        - 工具函数 / Utilities
        - 注册 / Registrations
        - 标签 / Tags
        - 配方 / Recipes
        - 客户端脚本 / Client scripts
        - 配置 / Config
        - 语言和资源 / Assets and lang
        - 可选联动 / Optional integrations
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 详细描述 / Details
      description: 补充当前行为、目标行为、迁移范围、兼容性限制或实现思路。
      placeholder: |
        当前情况：

        目标行为：

        迁移范围：

        注意事项：
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: 来源参考 / Source reference
      description: 旧仓库文件、当前实例配置、mod 文档或相关链接。
      placeholder: Create-Delight-Remake/kubejs/... 或 config/...
    validations:
      required: false

  - type: textarea
    id: files
    attributes:
      label: 预计涉及文件 / Expected files
      value: |
        - 
    validations:
      required: false

  - type: checkboxes
    id: migration-checks
    attributes:
      label: 迁移检查 / Migration checks
      options:
        - label: 已确认目标 mod 在 1.21.1 NeoForge 可用
        - label: 已确认 mod id、物品 id、标签或配置项没有沿用过期写法
        - label: 没有直接批量覆盖旧 Forge 1.20.1 文件
        - label: 自定义配方或资源 ID 使用小写并有明确命名空间

  - type: textarea
    id: validation
    attributes:
      label: 验证方式 / Validation
      description: 只写可验证的关闭条件或测试步骤。
      value: |
        - [ ] 启动客户端或服务端
        - [ ] 执行 `/reload`
        - [ ] 检查 latest.log 或相关报错
        - [ ] 进入目标场景确认行为
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 备注 / Notes
      description: 风险、未确认项、日志链接或相关 issue。
    validations:
      required: false
